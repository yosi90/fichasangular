<div id="container-lista" class="tw-w-full tw-bg-[#212529] tw-h-full">
    <div class="lista-row tw-w-full tw-relative tw-flex tw-justify-center tw-items-center">
        <button id="filtros" matTooltip="Filtros de conjuros" #filtros mat-icon-button
            [matMenuTriggerFor]="menuConjuros" class="filtros">
            <mat-icon>filter_alt</mat-icon>
        </button>
        <mat-menu id="containerMenu" #menuConjuros="matMenu" class="tw-me-1 menu-filtros-estandar">
            <div id="menu">
                <mat-form-field (click)="$event.stopPropagation();" (keyup)="filtroConjuros();">
                    <mat-label>Incluye texto</mat-label>
                    <input #conjuroTextInc matInput placeholder="Texto a buscar">
                </mat-form-field>
                <mat-form-field (click)="$event.stopPropagation();">
                    <mat-label>Manual</mat-label>
                    <mat-select #manualconjuro appearance="fill" [(value)]="defaultManual"
                        (selectionChange)="filtroConjuros();">
                        <mat-option [value]="'Cualquiera'">Cualquiera</mat-option>
                        <mat-option *ngFor="let m of Manuales" [value]="m.Nombre">{{m.Nombre}}</mat-option>
                    </mat-select>
                </mat-form-field>
            </div>
            <mat-chip-option #conjurosHomebrew color="warn" class="tw-mt-4 tw-mb-1"
                (click)="$event.stopPropagation(); AlternarConjurosHombrew(conjurosHomebrew.value);">{{anuncioConjurosHomebrew}}</mat-chip-option>
        </mat-menu>

        <table id="conjuros" #tablaConjuros mat-table [dataSource]="conjurosDS" matSort *ngIf="conjuros.length > 0; else cargando">
            <ng-container matColumnDef="{{column}}" *ngFor="let column of conjuroColumns">
                <th class="tw-text-lg tw-font-medium" mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Ordenar por {{column}}">
                    {{column.replace('_', ' ')}}
                </th>
                <td mat-cell *matCellDef="let element">
                    <button type="button" class="manual-clickable" *ngIf="column == 'Manual'"
                        (click)="abrirDetalleManual(element, $event)">
                        {{element[column]}}
                    </button>
                    <button mat-stroked-button matTooltip="Clic para ver este conjuro" [matTooltipShowDelay]="200" *ngIf="column == 'Nombre'" color="accent" class="tw-flex tw-justify-start sombra3d tw-w-full"
                        (click)="verDetallesConjuro(element.Id); $event.stopPropagation();">
                        <mat-icon>read_more</mat-icon>
                        {{element[column]}}
                    </button>
                    <div class="tw-flex tw-justify-center tw-items-center" *ngIf="column == 'Arcano' || column == 'Divino'|| column == 'Psionico'|| column == 'Alma'">
                        <p class="tw-inline good sombra3d-sm tw-rounded-md tw-mb-0" *ngIf="element[column]">
                            <mat-checkbox [checked]="true" [disableRipple]="true" (click)="$event.preventDefault(); $event.stopPropagation();"></mat-checkbox>
                        </p>
                    </div>
                    <div class="tw-flex tw-justify-center tw-items-center" *ngIf="column == 'Homebrew'">
                        <mat-checkbox #isHombrew [checked]="!element.Oficial" [disableRipple]="true"
                            (click)="$event.preventDefault(); $event.stopPropagation();"></mat-checkbox>
                    </div>
                </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="conjuroColumns; sticky: true"></tr>
            <tr mat-row *matRowDef="let element; columns: conjuroColumns;" class="element-row elegir"
                (click)="seleccionarConjuro(element.Id)"></tr>
            <tr class="mat-row" *matNoDataRow>
                <td class="mat-cell tw-text-center tw-text-white tw-p-3" colspan="6">
                    Ningún conjuro encaja con los filtros
                </td>
            </tr>
        </table>
        <ng-template #cargando>
            <div class="superballs">
                <div class="superballs__dot"></div>
                <div class="superballs__dot"></div>
            </div>
        </ng-template>
    </div>
    <div class="lista-row tw-w-full tw-flex tw-items-center">
        <mat-paginator class="tw-w-full" [pageSizeOptions]="[10, 20, 30, 40]" showFirstLastButtons aria-label="Selecciona una página de conjuros">
        </mat-paginator>
    </div>
</div>
