<mat-form-field appearance="fill" (click)="$event.stopPropagation()" (keyup)="$event.stopPropagation()">
    <mat-label>{{label}}</mat-label>
    <input
        matInput
        [disabled]="disabled"
        [value]="searchText"
        [placeholder]="placeholder"
        [matAutocomplete]="manualAuto"
        (input)="onInput($any($event.target).value)"
        (blur)="onBlur()"
        (click)="$event.stopPropagation()"
        (keydown)="$event.stopPropagation()" />
    <button
        *ngIf="hasValue()"
        mat-icon-button
        matSuffix
        type="button"
        aria-label="Limpiar manual"
        matTooltip="Limpiar manual"
        (click)="limpiar($event)">
        <mat-icon>close</mat-icon>
    </button>
    <mat-autocomplete #manualAuto="matAutocomplete" (optionSelected)="seleccionar($event.option.value)">
        <mat-option *ngIf="includeAny" [value]="anyValue" (click)="$event.stopPropagation()">
            {{anyLabel}}
        </mat-option>
        <mat-option
            *ngFor="let manual of opcionesFiltradas; trackBy: trackByOption"
            [value]="getOptionValue(manual)"
            (click)="$event.stopPropagation()">
            {{getOptionLabel(manual)}}
        </mat-option>
    </mat-autocomplete>
</mat-form-field>
