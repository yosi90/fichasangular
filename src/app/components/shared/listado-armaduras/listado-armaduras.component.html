<div id="container-lista" class="tw-w-full tw-bg-[#212529] tw-h-full">
    <div class="lista-row tw-w-full tw-relative tw-flex tw-justify-center tw-items-center">
        <button id="filtros" matTooltip="Filtros de armaduras" #filtros mat-icon-button
            [matMenuTriggerFor]="menuArmaduras" class="filtros">
            <mat-icon>filter_alt</mat-icon>
        </button>
        <mat-menu id="containerMenu" #menuArmaduras="matMenu" class="tw-me-1 menu-filtros-estandar menu-armaduras-filtros">
            <div id="menu">
                <mat-form-field (click)="$event.stopPropagation();" (keyup)="filtroArmaduras();">
                    <mat-label>Incluye texto</mat-label>
                    <input #armaduraTextInc matInput placeholder="Texto a buscar">
                </mat-form-field>
                <app-manual-autocomplete
                    [manuales]="manuales"
                    [(value)]="defaultManual"
                    (selectionChange)="filtroArmaduras()">
                </app-manual-autocomplete>
                <mat-form-field (click)="$event.stopPropagation();">
                    <mat-label>Tipo de armadura</mat-label>
                    <mat-select appearance="fill" [(value)]="defaultTipoArmadura" (selectionChange)="filtroArmaduras();">
                        <mat-option *ngFor="let tipo of tiposArmadura" [value]="tipo">{{tipo}}</mat-option>
                    </mat-select>
                </mat-form-field>
            </div>
            <div class="filtros-chips">
                <mat-chip-option color="accent" class="filtro-chip" [selected]="soloEscudos"
                    (click)="$event.stopPropagation(); alternarSoloEscudos();">Solo escudos</mat-chip-option>
                <mat-chip-option color="warn" class="filtro-chip" [selected]="homebrewActivo"
                    (click)="$event.stopPropagation(); AlternarArmadurasHombrew();">{{anuncioHomebrew}}</mat-chip-option>
            </div>
        </mat-menu>

        <table id="armaduras" #tablaArmaduras mat-table [dataSource]="armadurasDS" matSort *ngIf="armaduras.length > 0; else cargando">
            <ng-container matColumnDef="{{column}}" *ngFor="let column of armaduraColumns">
                <th class="tw-text-lg tw-font-medium" mat-header-cell *matHeaderCellDef mat-sort-header
                    sortActionDescription="Ordenar por {{column}}">
                    {{column.replace('_', ' ')}}
                </th>
                <td mat-cell *matCellDef="let element">
                    <button type="button" class="manual-clickable" *ngIf="column == 'Manual'"
                        (click)="abrirDetalleManual(element, $event)">
                        {{getManualVisible(element)}}
                    </button>
                    <button mat-stroked-button matTooltip="Clic para ver esta armadura" [matTooltipShowDelay]="200"
                        *ngIf="column == 'Nombre'" color="accent" class="tw-flex tw-justify-start sombra3d tw-w-full"
                        (click)="verDetallesArmadura(element.Id); $event.stopPropagation();">
                        <mat-icon>read_more</mat-icon>
                        {{element[column]}}
                    </button>
                    <span *ngIf="column == 'Tipo_armadura'">{{element.Tipo_armadura?.Nombre}}</span>
                </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="armaduraColumns; sticky: true"></tr>
            <tr mat-row *matRowDef="let element; columns: armaduraColumns;" class="element-row elegir"
                (click)="seleccionarArmadura(element.Id)"></tr>
            <tr class="mat-row" *matNoDataRow>
                <td class="mat-cell tw-text-center tw-text-white tw-p-3" [attr.colspan]="armaduraColumns.length">
                    Ninguna armadura encaja con los filtros
                </td>
            </tr>
        </table>
        <ng-template #cargando>
            <div class="superballs">
                <div class="superballs__dot"></div>
                <div class="superballs__dot"></div>
            </div>
        </ng-template>
    </div>
    <div class="lista-row tw-w-full tw-flex tw-items-center">
        <mat-paginator class="tw-w-full" [pageSizeOptions]="[10, 20, 30, 40]" showFirstLastButtons
            aria-label="Selecciona una página de armaduras">
        </mat-paginator>
    </div>
</div>
