<mat-card class="tw-text-white">
    <mat-card-header>
        <mat-card-title>Lista de {{tipoLista}}</mat-card-title>
        <mat-card-subtitle>Pulsa un item para {{tipoOperacion === 'detalles' ? 'ver su descripción completa' : 'modificarlo'}}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content class="tw-flex tw-justify-start tw-items-start tw-p-2 tw-gap-2">
        <ng-template #contenedor></ng-template>
    </mat-card-content>
</mat-card>
