<div class="prereq-row-grid">
    <mat-form-field appearance="fill" *ngIf="!definition.usesSaveSelector">
        <mat-label>{{definition.catalogLabel || 'Elemento'}}</mat-label>
        <mat-select
            [value]="row.id"
            [disabled]="disabled"
            (selectionChange)="patchChange.emit({ id: $event.value })">
            <mat-option [value]="0">Seleccionar...</mat-option>
            <mat-option *ngFor="let item of catalog" [value]="item.id">
                {{item.nombre}}
            </mat-option>
        </mat-select>
    </mat-form-field>

    <mat-form-field appearance="fill" *ngIf="definition.usesSaveSelector">
        <mat-label>Salvacion</mat-label>
        <mat-select
            [value]="row.salvacion_tipo"
            [disabled]="disabled"
            (selectionChange)="patchChange.emit({ salvacion_tipo: $event.value })">
            <mat-option *ngFor="let item of salvacionesCatalogo" [value]="item.key">
                {{item.label}}
            </mat-option>
        </mat-select>
    </mat-form-field>

    <mat-form-field appearance="fill">
        <mat-label>{{definition.valueLabel || 'Valor'}}</mat-label>
        <input
            matInput
            type="number"
            [value]="row.valor"
            [disabled]="disabled"
            (input)="patchChange.emit({ valor: +$any($event.target).value || 0 })">
    </mat-form-field>

    <mat-checkbox
        class="prereq-extra-check"
        *ngIf="definition.supportsRequiresExtra && allowRequiresExtra"
        [checked]="row.requiere_extra"
        [disabled]="disabled"
        (change)="patchChange.emit({ requiere_extra: $event.checked === true })">
        Exige extra en la habilidad
    </mat-checkbox>

    <mat-form-field appearance="fill">
        <mat-label>Combinacion (opcional)</mat-label>
        <input
            matInput
            type="number"
            [value]="row.opcional"
            [disabled]="disabled"
            (input)="patchChange.emit({ opcional: +$any($event.target).value || 0 })">
    </mat-form-field>
</div>
