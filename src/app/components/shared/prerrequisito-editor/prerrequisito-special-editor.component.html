<div class="prereq-row-grid">
    <mat-form-field appearance="fill">
        <mat-label>{{definition.catalogLabel || 'Elemento'}}</mat-label>
        <mat-select
            [value]="row.id"
            [disabled]="disabled"
            (selectionChange)="patchChange.emit({ id: $event.value })">
            <mat-option [value]="0">Seleccionar...</mat-option>
            <mat-option *ngFor="let item of catalog" [value]="item.id">
                {{item.nombre}}
            </mat-option>
        </mat-select>
    </mat-form-field>

    <mat-form-field appearance="fill" *ngIf="definition.supportsRepeated">
        <mat-label>Veces requerida</mat-label>
        <input
            matInput
            type="number"
            [value]="row.repetido"
            [disabled]="disabled"
            (input)="patchChange.emit({ repetido: +$any($event.target).value || 1 })">
    </mat-form-field>

    <mat-form-field appearance="fill" *ngIf="showExtraSelector">
        <mat-label>Extra asociado (opcional)</mat-label>
        <mat-select
            [value]="row.id_extra"
            [disabled]="disabled"
            (selectionChange)="patchChange.emit({ id_extra: $event.value })">
            <mat-option [value]="null">No especificar</mat-option>
            <mat-option [value]="-1">Sin extra</mat-option>
            <mat-option [value]="0">Usar extra seleccionado</mat-option>
            <mat-option *ngFor="let item of extraOptions" [value]="item.id">
                {{item.nombre}}
            </mat-option>
        </mat-select>
    </mat-form-field>

    <div class="prereq-hint" *ngIf="showExtraDisabledMessage">
        {{extraDisabledMessage}}
    </div>

    <mat-form-field appearance="fill">
        <mat-label>Combinacion (opcional)</mat-label>
        <input
            matInput
            type="number"
            [value]="row.opcional"
            [disabled]="disabled"
            (input)="patchChange.emit({ opcional: +$any($event.target).value || 0 })">
    </mat-form-field>
</div>
